<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sunbelt Sports — Construction Management Portal</title>
<meta name="viewport" content="width=1280">
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script src="data.js?v=2"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="tab_dashboard.jsx"></script>
<script type="text/babel" src="tab_dashboard_variants.jsx"></script>
<script type="text/babel" src="tab_live.jsx"></script>
<script type="text/babel" src="tab_portfolio.jsx"></script>
<script type="text/babel" src="tab_schedule.jsx"></script>
<script type="text/babel" src="tab_rest.jsx"></script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "density": "comfortable",
  "heroVariant": "strip",
  "dashboardVariant": "A"
}/*EDITMODE-END*/;

function App() {
  const [tab, setTab] = useRoute();
  const [tweaks, setTweaks] = React.useState(() => {
    try { return { ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem("sbs.tweaks")||"{}") }; }
    catch(e){ return TWEAK_DEFAULTS; }
  });
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  React.useEffect(() => {
    document.body.dataset.theme = tweaks.theme;
    document.body.dataset.density = tweaks.density;
    localStorage.setItem("sbs.tweaks", JSON.stringify(tweaks));
  }, [tweaks]);

  // Edit-mode protocol
  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode") setTweaksOpen(true);
      if (d.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", onMsg);
    try { window.parent.postMessage({ type:"__edit_mode_available" }, "*"); } catch(e){}
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const setTweak = (k, v) => {
    setTweaks(t => {
      const next = { ...t, [k]: v };
      try { window.parent.postMessage({ type:"__edit_mode_set_keys", edits:{ [k]: v } }, "*"); } catch(e){}
      return next;
    });
  };

  return (
    <>
      <TopBar tab={tab} setTab={setTab} tweaks={tweaks}/>
      {tab === "dashboard" && tweaks.dashboardVariant === "A" && <DashboardPage heroVariant={tweaks.heroVariant} onTab={setTab}/>}
      {tab === "dashboard" && tweaks.dashboardVariant === "B" && <DashboardVariantB onTab={setTab}/>}
      {tab === "dashboard" && tweaks.dashboardVariant === "C" && <DashboardVariantC onTab={setTab}/>}
      {tab === "live" && <LivePage onTab={setTab}/>}
      {tab === "portfolio" && <PortfolioPage onTab={setTab}/>}
      {tab === "schedule"  && <SchedulePage onTab={setTab}/>}
      {tab === "equipment" && <EquipmentPage onTab={setTab}/>}
      {tab === "fleet"     && <FleetPage onTab={setTab}/>}
      {tab === "scorecard" && <ScorecardPage onTab={setTab}/>}
      {tab === "sales"     && <SalesPage onTab={setTab}/>}
      {tab === "marketing" && <MarketingPage onTab={setTab}/>}

      <div className={"sbs-tweaks " + (tweaksOpen?"on":"")}>
        <div className="sbs-tweaks-head">
          <span className="t">TWEAKS</span>
          <button className="sbs-btn ghost" style={{color:"#fff",padding:0,height:"auto"}} onClick={()=>setTweaksOpen(false)}>✕</button>
        </div>
        <div className="sbs-tweaks-body">
          <div className="sbs-tweak-row">
            <label>Theme</label>
            <div className="opts">
              {["light","dark"].map(o=><button key={o} className={tweaks.theme===o?"on":""} onClick={()=>setTweak("theme",o)}>{o}</button>)}
            </div>
          </div>
          <div className="sbs-tweak-row">
            <label>Density</label>
            <div className="opts">
              {["comfortable","compact"].map(o=><button key={o} className={tweaks.density===o?"on":""} onClick={()=>setTweak("density",o)}>{o}</button>)}
            </div>
          </div>
          <div className="sbs-tweak-row">
            <label>Dashboard</label>
            <div className="opts">
              {[["A","A · Briefing"],["B","B · Command"],["C","C · Editorial"]].map(([v,l])=><button key={v} className={tweaks.dashboardVariant===v?"on":""} onClick={()=>setTweak("dashboardVariant",v)}>{l}</button>)}
            </div>
          </div>
          <div className="sbs-tweak-row">
            <label>Hero style (A)</label>
            <div className="opts">
              {[["hero","Hero"],["strip","Strip"],["mixed","Mixed"]].map(([v,l])=><button key={v} className={tweaks.heroVariant===v?"on":""} onClick={()=>setTweak("heroVariant",v)}>{l}</button>)}
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
